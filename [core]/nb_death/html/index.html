<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Vortex Military - Death Screen</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="deathScreen" class="hidden">
        <div class="vignette"></div>

        <div class="death-center">
            <div class="death-title">MEGHALTÁL</div>
            <div class="death-killer hidden" id="killerLine"></div>
        </div>

        <div class="death-bottom">
            <div class="countdown-label">ÚJRAÉLEDÉS</div>
            <div class="countdown" id="countdown">05:00</div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

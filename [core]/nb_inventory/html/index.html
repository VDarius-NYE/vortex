<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Vortex Military - Inventory</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="inventory-wrap">
            <div class="panel" id="playerPanel">
                <div class="panel-header">
                    <div class="panel-title">SAJÁT INVENTORY</div>
                </div>
                <div class="panel-body">
                    <div class="grid" id="playerGrid"></div>
                    <div class="weight-wrap">
                        <div class="weight-label" id="playerWeightLabel">0/50kg</div>
                        <div class="weight-track"><div class="weight-fill" id="playerWeightFill"></div></div>
                    </div>
                </div>
            </div>

            <div class="panel hidden" id="stashPanel">
                <div class="panel-header">
                    <div class="panel-title" id="stashTitle">STASH</div>
                </div>
                <div class="panel-body">
                    <div class="grid" id="stashGrid"></div>
                    <div class="weight-wrap">
                        <div class="weight-label" id="stashWeightLabel">0/0kg</div>
                        <div class="weight-track"><div class="weight-fill" id="stashWeightFill"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-bar hidden" id="actionBar">
            <div class="action-item-name" id="actionItemName"></div>
            <button class="action-btn" id="useBtn">Használat</button>
            <button class="action-btn" id="halfBtn">Felezés</button>
            <input type="number" id="customAmountInput" class="amount-input" min="1" placeholder="Db">
            <button class="action-btn" id="customSplitBtn">Szétválasztás</button>
            <button class="action-btn secondary" id="deselectBtn">Bezárás</button>
        </div>

        <button id="closeBtn" class="close-btn">✕</button>
    </div>

    <div id="tooltip" class="tooltip hidden"></div>

    <script src="js/script.js"></script>
</body>
</html>

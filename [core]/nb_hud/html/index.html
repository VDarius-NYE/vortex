<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Vortex Military - HUD</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hudContainer"></div>

    <div id="editorOverlay" class="hidden">
        <div class="editor-hint">Húzd az elemeket a kívánt pozícióba, a panelt a fejlécénél fogva. Nyomj <kbd>F9</kbd>-et vagy kattints a Bezárásra a kilépéshez.</div>

        <div class="editor-panel">
            <div class="editor-drag-handle" id="editorDragHandle">
                <h2>HUD Szerkesztő</h2>
            </div>

            <div class="editor-body">
                <div class="editor-section">
                    <label class="editor-label">Megjelenítési stílus</label>
                    <div class="style-choice">
                        <button class="style-btn" data-style="bar">Csík</button>
                        <button class="style-btn" data-style="radial">Körkörös</button>
                        <button class="style-btn" data-style="numeric">Szám</button>
                    </div>
                </div>

                <div class="editor-category">
                    <div class="category-title">Vitális jelzők</div>
                    <div id="visListVital" class="visibility-list"></div>
                </div>

                <div class="editor-category">
                    <div class="category-title">Infó elemek</div>
                    <div id="visListInfo" class="visibility-list"></div>
                </div>

                <div class="editor-category span-full">
                    <div class="category-title">Egyéb</div>
                    <div id="visListOther" class="visibility-list"></div>
                </div>
            </div>

            <div class="editor-actions">
                <button id="saveEditorBtn" class="btn-primary">Mentés</button>
                <button id="resetEditorBtn" class="btn-secondary">Alaphelyzet</button>
                <button id="closeEditorBtn" class="btn-secondary">Bezárás</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Vortex Military - Zóna Infó</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="zonePanel" class="hidden">
        <div class="zone-corner tl"></div>
        <div class="zone-corner tr"></div>
        <div class="zone-corner bl"></div>
        <div class="zone-corner br"></div>

        <div class="zone-header">
            <div class="zone-icon-box"><i id="zoneIcon" class="fa-solid fa-shield-halved"></i></div>
            <div class="zone-title" id="zoneTitle">Zóna Infó</div>
        </div>

        <div class="zone-divider"></div>

        <div class="zone-message" id="zoneMessage"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
